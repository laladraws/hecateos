# HecateOS — ROCm environment variables
# AMD RX 9070 XT — RDNA 4 — gfx1201

# Identificador de la arquitectura GPU para ROCm
HSA_OVERRIDE_GFX_VERSION=12.0.1

# Dispositivos visibles para ROCm/HIP
HIP_VISIBLE_DEVICES=0
ROCR_VISIBLE_DEVICES=0

# Necesario para algunas apps que no detectan RDNA 4 automáticamente
ROC_ENABLE_PRE_VEGA=0

# Para Blender — forzar uso de HIP en lugar de OpenCL
CYCLES_ONEAPI_FILTER_DEVICE_TYPE=gpu

# Mesa / Vulkan — asegurar que la GPU AMD sea la preferida
VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/radeon_icd.x86_64.json

# AMD performance mode (auto = el driver decide según carga)
# Opciones: auto, low, high, manual
AMDGPU_POWER_PROFILE=auto
