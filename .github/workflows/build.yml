name: Build and push HecateOS

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  IMAGE_NAME: hecate-os
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FEDORA_VERSION: "43"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # necesario para cosign OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image tags
        id: tags
        run: |
          TIMESTAMP=$(date +%Y%m%d)
          echo "tags=latest" >> $GITHUB_OUTPUT
          echo "tag_version=${FEDORA_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_dated=${FEDORA_VERSION}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      # ── Build ─────────────────────────────────────────────────────

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ env.FEDORA_VERSION }}
            ${{ env.FEDORA_VERSION }}-${{ steps.tags.outputs.tag_dated }}
          build-args: |
            FEDORA_VERSION=${{ env.FEDORA_VERSION }}
          oci: true
          
      # ── Push ──────────────────────────────────────────────────────
      - name: Push to GHCR
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Firma con cosign ──────────────────────────────────────────
#      - name: Install cosign
#        uses: sigstore/cosign-installer@v3

#      - name: Sign image
#        run: |
#          cosign sign --yes \
#            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

  # ── Job separado para generar ISO en cada release ───────────────
  build-iso:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso
        with:
          image_repo: ${{ env.IMAGE_REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
          image_tag: latest
          variant: Silverblue
          version: ${{ env.FEDORA_VERSION }}
          iso_name: HecateOS-${{ env.FEDORA_VERSION }}.iso

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HecateOS-ISO
          path: ${{ steps.iso.outputs.iso_path }}
          retention-days: 14

      # En releases con tag, subir la ISO como release asset
      - name: Upload ISO to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.iso.outputs.iso_path }}
